name: CI

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    name: verify / rust and webui

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: npm install

      - name: Build WebUI
        run: npm run build:webui

      - name: Find changed Rust files
        id: rust-files
        shell: bash
        run: |
          git diff --name-only origin/main...HEAD -- '*.rs' > changed-rust-files.txt
          if [[ -s changed-rust-files.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Format changed Rust files for manual runs
        if: github.event_name == 'workflow_dispatch' && steps.rust-files.outputs.has_files == 'true'
        shell: bash
        run: |
          xargs -r rustfmt --edition 2021 < changed-rust-files.txt
          git diff --binary > rustfmt.patch

      - name: Upload Rust formatting patch
        if: github.event_name == 'workflow_dispatch' && steps.rust-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-patch
          path: rustfmt.patch

      - name: Check changed Rust formatting
        if: github.event_name != 'workflow_dispatch' && steps.rust-files.outputs.has_files == 'true'
        shell: bash
        run: xargs -r rustfmt --edition 2021 --check < changed-rust-files.txt

      - name: Lint Rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --release --lib

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_zig: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: build / ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install zig (for glibc 2.31 targeting)
        if: matrix.use_zig == true
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install cargo-zigbuild
        if: matrix.use_zig == true
        run: pip3 install cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install dependencies
        run: npm install

      - name: Build WebUI
        run: npm run build:webui

      - name: Build native (with zig for glibc 2.31)
        if: matrix.use_zig == true
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.31
          cp target/x86_64-unknown-linux-gnu/release/libpi_switch_native.so pi-switch-native.linux-x64-gnu.node

      - name: Build native (standard)
        if: matrix.use_zig != true
        run: |
          npm install -g @napi-rs/cli
          npm run build:native -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts
          merge-multiple: true

      - name: Move artifacts to project root
        run: mv artifacts/*.node .

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
